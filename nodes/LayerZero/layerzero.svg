<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="lzGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#lzGradient)" stroke="#333" stroke-width="2"/>
  
  <!-- LayerZero stylized "L" and "0" -->
  <!-- L shape -->
  <path d="M 25 25 L 25 65 L 45 65 L 45 58 L 32 58 L 32 25 Z" fill="white"/>
  
  <!-- 0 shape / ring representing cross-chain -->
  <circle cx="62" cy="50" r="18" fill="none" stroke="white" stroke-width="6"/>
  
  <!-- Connection dots representing endpoints -->
  <circle cx="44" cy="50" r="3" fill="#00ff88"/>
  <circle cx="80" cy="50" r="3" fill="#00ff88"/>
  
  <!-- Subtle connecting line -->
  <line x1="47" y1="50" x2="77" y2="50" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
</svg>
